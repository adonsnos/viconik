<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyboard Rápido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0E10; --panel:#17191D; --panel-2:#1E2126; --border:#2A2D33;
  --text:#ECEAE5; --text-dim:#8B8F96; --accent:#F2A93B;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);padding:40px 20px;}
.wrap{max-width:1120px;margin:0 auto;}
.sprockets{display:flex;gap:6px;margin-bottom:22px;}
.sprockets span{width:8px;height:8px;border-radius:50%;background:var(--border);}
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;flex-wrap:wrap;gap:16px;}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 8px;}
h1{margin:0;font-size:26px;font-weight:700;letter-spacing:-0.01em;}
.sub{color:var(--text-dim);font-size:14px;margin-top:8px;}
.toolbar{display:flex;gap:10px;}
.btn{background:var(--accent);color:#161206;border:none;padding:11px 18px;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:12.5px;letter-spacing:.05em;cursor:pointer;text-transform:uppercase;}
.btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--border);}
.meta{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap;}
.meta input{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:7px;font-family:var(--mono);font-size:13px;}
.meta input::placeholder{color:var(--text-dim);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:grab;}
.card.dragging{opacity:.4;}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.shot-num{font-family:var(--mono);font-weight:700;color:var(--accent);font-size:13px;}
.del{color:var(--text-dim);cursor:pointer;font-family:var(--mono);font-size:16px;line-height:1;background:none;border:none;}
.del:hover{color:#E85D5D;}
canvas{width:100%;aspect-ratio:16/9;background:#000;border-radius:6px;border:1px solid var(--border);touch-action:none;}
.tools{display:flex;gap:6px;margin-top:8px;}
.tools button{flex:1;background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);padding:6px;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer;}
.tools button.active{color:var(--accent);border-color:var(--accent);}
.fields{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.fields textarea, .fields select, .fields input{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-family:var(--sans);font-size:12.5px;resize:none;}
.fields textarea{min-height:44px;}
.row2{display:flex;gap:8px;}
.add-card{display:flex;align-items:center;justify-content:center;border:2px dashed var(--border);border-radius:10px;min-height:220px;color:var(--text-dim);font-family:var(--mono);font-size:13px;cursor:pointer;}
.add-card:hover{border-color:var(--accent);color:var(--accent);}
footer{text-align:center;color:var(--text-dim);font-size:12px;margin-top:28px;font-family:var(--mono);}
@media print{
  body{background:#fff;color:#000;padding:0;}
  .toolbar,.tools,.del,.add-card{display:none !important;}
  .sprockets{display:none;}
  .card{break-inside:avoid;border-color:#ccc;background:#fff;}
  .fields textarea,.fields select,.fields input{background:#fff;border-color:#ccc;color:#000;}
  .grid{gap:12px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="sprockets"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <header>
    <div>
      <p class="eyebrow">Utilidad de producción</p>
      <h1>Storyboard Rápido</h1>
      <p class="sub">Dibuja, describe y ordena planos antes del rodaje. Arrastra las tarjetas para reordenar.</p>
    </div>
    <div class="toolbar">
      <button class="btn secondary" id="printBtn">Exportar / imprimir</button>
      <button class="btn" id="addBtn">+ Nuevo plano</button>
    </div>
  </header>

  <div class="meta">
    <input type="text" id="projectName" placeholder="Proyecto">
    <input type="text" id="sceneName" placeholder="Escena / secuencia">
    <input type="text" id="dateField" placeholder="Fecha">
  </div>

  <div class="grid" id="grid"></div>
</div>
<footer>Los dibujos se guardan solo en esta sesión — exporta o imprime antes de cerrar</footer>

<script>
const grid = document.getElementById('grid');
let shotCount = 0;

function newCard(){
  shotCount++;
  const card = document.createElement('div');
  card.className = 'card';
  card.draggable = true;
  card.innerHTML = `
    <div class="card-head">
      <span class="shot-num">PLANO ${String(shotCount).padStart(2,'0')}</span>
      <button class="del">×</button>
    </div>
    <canvas width="480" height="270"></canvas>
    <div class="tools">
      <button class="pen active" data-tool="pen">Lápiz</button>
      <button class="eraser" data-tool="eraser">Borrar</button>
      <button class="clear-canvas">Limpiar</button>
    </div>
    <div class="fields">
      <textarea placeholder="Descripción del plano..."></textarea>
      <div class="row2">
        <select>
          <option>Fijo</option>
          <option>Pan</option>
          <option>Tilt</option>
          <option>Travelling</option>
          <option>Dolly</option>
          <option>Zoom</option>
          <option>Grúa</option>
          <option>Steadicam / mano</option>
        </select>
        <input type="text" placeholder="Duración (ej. 3s)">
      </div>
    </div>
  `;
  setupCanvas(card.querySelector('canvas'));
  setupDrag(card);
  card.querySelector('.del').addEventListener('click',()=>{card.remove(); renumber();});
  card.querySelectorAll('.tools button[data-tool]').forEach(b=>{
    b.addEventListener('click',()=>{
      card.querySelectorAll('.tools button[data-tool]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      card.dataset.tool = b.dataset.tool;
    });
  });
  card.querySelector('.clear-canvas').addEventListener('click',()=>{
    const c = card.querySelector('canvas'); const ctx = c.getContext('2d');
    ctx.fillStyle='#000'; ctx.fillRect(0,0,c.width,c.height);
  });
  card.dataset.tool = 'pen';
  return card;
}

function setupCanvas(canvas){
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#ECEAE5'; ctx.lineWidth = 3; ctx.lineCap='round';
  let drawing = false;
  function pos(e){
    const r = canvas.getBoundingClientRect();
    const cx = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
    const cy = (e.touches?e.touches[0].clientY:e.clientY) - r.top;
    return {x: cx*(canvas.width/r.width), y: cy*(canvas.height/r.height)};
  }
  function start(e){ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
  function move(e){
    if(!drawing) return;
    const p = pos(e);
    const tool = canvas.closest('.card').dataset.tool;
    ctx.globalCompositeOperation = tool==='eraser' ? 'destination-out' : 'source-over';
    ctx.strokeStyle = tool==='eraser' ? 'rgba(0,0,0,1)' : '#ECEAE5';
    ctx.lineWidth = tool==='eraser' ? 16 : 3;
    ctx.lineTo(p.x,p.y); ctx.stroke();
    e.preventDefault();
  }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start);
  canvas.addEventListener('touchmove',move);
  canvas.addEventListener('touchend',end);
}

let dragSrc = null;
function setupDrag(card){
  card.addEventListener('dragstart',()=>{ dragSrc = card; card.classList.add('dragging'); });
  card.addEventListener('dragend',()=>{ card.classList.remove('dragging'); renumber(); });
  card.addEventListener('dragover',e=>{
    e.preventDefault();
    const after = getDragAfter(grid, e.clientY, e.clientX);
    if(after==null) grid.appendChild(dragSrc); else grid.insertBefore(dragSrc, after);
  });
}
function getDragAfter(container,y,x){
  const els = [...container.querySelectorAll('.card:not(.dragging)')];
  return els.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset<0 && offset > closest.offset) return {offset, element: child};
    return closest;
  }, {offset: -Infinity}).element;
}
function renumber(){
  grid.querySelectorAll('.card').forEach((c,i)=>{
    c.querySelector('.shot-num').textContent = 'PLANO ' + String(i+1).padStart(2,'0');
  });
  shotCount = grid.querySelectorAll('.card').length;
}

document.getElementById('addBtn').addEventListener('click',()=>grid.appendChild(newCard()));
document.getElementById('printBtn').addEventListener('click',()=>window.print());

for(let i=0;i<4;i++) grid.appendChild(newCard());
</script>
</body>
</html>
