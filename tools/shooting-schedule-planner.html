<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificador de Rodaje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0E10; --panel:#17191D; --panel-2:#1E2126; --border:#2A2D33;
  --text:#ECEAE5; --text-dim:#8B8F96; --accent:#F2A93B;
  --c-intday:#EDEDED; --c-intnight:#8FB8E8; --c-extday:#F2E27A; --c-extnight:#8CE0A8;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);padding:40px 20px;}
.wrap{max-width:1200px;margin:0 auto;}
.sprockets{display:flex;gap:6px;margin-bottom:22px;}
.sprockets span{width:8px;height:8px;border-radius:50%;background:var(--border);}
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:16px;}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 8px;}
h1{margin:0;font-size:26px;font-weight:700;letter-spacing:-0.01em;}
.sub{color:var(--text-dim);font-size:14px;margin-top:8px;max-width:60ch;line-height:1.5;}
.toolbar{display:flex;gap:10px;}
.btn{background:var(--accent);color:#161206;border:none;padding:10px 16px;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.04em;cursor:pointer;text-transform:uppercase;}
.btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--border);}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.legend div{display:flex;align-items:center;gap:6px;}
.dot{width:10px;height:10px;border-radius:2px;}
.new-scene{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.f{display:flex;flex-direction:column;gap:6px;}
.f label{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);}
.f input, .f select{background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-family:var(--mono);font-size:12.5px;}
.f.grow{flex:1;min-width:140px;}
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}
.column{min-width:250px;flex-shrink:0;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;}
.column-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--panel-2);}
.column-head h3{font-size:12.5px;margin:0;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;}
.column-head .total{font-family:var(--mono);font-size:10.5px;color:var(--text-dim);}
.column-body{min-height:80px;display:flex;flex-direction:column;gap:8px;}
.strip{border-radius:6px;padding:9px 10px;color:#111;cursor:grab;font-size:12px;position:relative;}
.strip.dragging{opacity:.4;}
.strip .top{display:flex;justify-content:space-between;font-family:var(--mono);font-weight:700;font-size:11px;}
.strip .desc{margin-top:3px;font-size:11.5px;line-height:1.3;}
.strip .meta{margin-top:4px;font-family:var(--mono);font-size:9.5px;opacity:.7;}
.strip .del{position:absolute;top:6px;right:8px;background:none;border:none;font-size:13px;cursor:pointer;color:#111;opacity:.5;}
.strip .del:hover{opacity:1;}
.add-day-btn{min-width:140px;flex-shrink:0;border:2px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-family:var(--mono);font-size:12px;cursor:pointer;}
.add-day-btn:hover{border-color:var(--accent);color:var(--accent);}
footer{text-align:center;color:var(--text-dim);font-size:12px;margin-top:28px;font-family:var(--mono);}
@media print{
  .new-scene,.toolbar,.strip .del,.add-day-btn{display:none !important;}
  body{background:#fff;color:#000;}
  .board{overflow:visible;flex-wrap:wrap;}
  .column{background:#fff;border-color:#ccc;break-inside:avoid;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="sprockets"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <header>
    <div>
      <p class="eyebrow">Utilidad de producción</p>
      <h1>Planificador de Rodaje</h1>
      <p class="sub">Desglosa escenas y repártelas entre jornadas arrastrando las tarjetas. Estilo stripboard clásico de AD.</p>
    </div>
    <div class="toolbar">
      <button class="btn secondary" id="printBtn">Imprimir</button>
    </div>
  </header>

  <div class="legend">
    <div><span class="dot" style="background:var(--c-intday)"></span>INT · DÍA</div>
    <div><span class="dot" style="background:var(--c-intnight)"></span>INT · NOCHE</div>
    <div><span class="dot" style="background:var(--c-extday)"></span>EXT · DÍA</div>
    <div><span class="dot" style="background:var(--c-extnight)"></span>EXT · NOCHE</div>
  </div>

  <div class="new-scene">
    <div class="f"><label>Escena</label><input type="text" id="nScene" style="width:60px" placeholder="1"></div>
    <div class="f"><label>Int/Ext</label><select id="nIntExt"><option value="INT">INT</option><option value="EXT">EXT</option></select></div>
    <div class="f"><label>Día/Noche</label><select id="nDayNight"><option value="DÍA">DÍA</option><option value="NOCHE">NOCHE</option></select></div>
    <div class="f grow"><label>Localización</label><input type="text" id="nLoc" placeholder="Oficina, planta 3"></div>
    <div class="f grow"><label>Descripción</label><input type="text" id="nDesc" placeholder="Entrevista a CEO"></div>
    <div class="f"><label>Páginas/min est.</label><input type="text" id="nDur" style="width:80px" placeholder="1/8"></div>
    <div class="f"><label>Reparto</label><input type="text" id="nCast" style="width:80px" placeholder="1,2"></div>
    <button class="btn" id="addSceneBtn">+ Añadir escena</button>
  </div>

  <div class="board" id="board"></div>
</div>
<footer>Los datos se guardan solo en esta sesión — imprime antes de cerrar</footer>

<script>
const COLORS = {
  'INT-DÍA': 'var(--c-intday)', 'INT-NOCHE': 'var(--c-intnight)',
  'EXT-DÍA': 'var(--c-extday)', 'EXT-NOCHE': 'var(--c-extnight)',
};
const board = document.getElementById('board');
let dayCount = 0;

function addDay(){
  dayCount++;
  const col = document.createElement('div');
  col.className = 'column';
  col.dataset.day = dayCount;
  col.innerHTML = `
    <div class="column-head"><h3>Día ${dayCount}</h3><span class="total">0 escenas</span></div>
    <div class="column-body" data-day="${dayCount}"></div>
  `;
  board.insertBefore(col, document.getElementById('addDayBtn'));
  setupDropzone(col.querySelector('.column-body'));
}

function addUnassignedIfMissing(){
  if(document.querySelector('.column[data-day="unassigned"]')) return;
  const col = document.createElement('div');
  col.className = 'column';
  col.dataset.day = 'unassigned';
  col.innerHTML = `
    <div class="column-head"><h3>Sin asignar</h3><span class="total">0 escenas</span></div>
    <div class="column-body" data-day="unassigned"></div>
  `;
  board.insertBefore(col, board.firstChild);
  setupDropzone(col.querySelector('.column-body'));
}

const addDayBtn = document.createElement('div');
addDayBtn.className = 'add-day-btn';
addDayBtn.id = 'addDayBtn';
addDayBtn.textContent = '+ Añadir jornada';
addDayBtn.addEventListener('click', addDay);

addUnassignedIfMissing();
board.appendChild(addDayBtn);
addDay();

let dragSrc = null;
function setupDropzone(zone){
  zone.addEventListener('dragover', e=>{
    e.preventDefault();
    const after = getDragAfter(zone, e.clientY);
    if(after==null) zone.appendChild(dragSrc); else zone.insertBefore(dragSrc, after);
  });
  zone.addEventListener('drop', e=>{ e.preventDefault(); updateTotals(); });
}
function getDragAfter(zone, y){
  const els = [...zone.querySelectorAll('.strip:not(.dragging)')];
  return els.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset<0 && offset>closest.offset) return {offset, element: child};
    return closest;
  }, {offset:-Infinity}).element;
}

function addScene(data){
  const strip = document.createElement('div');
  strip.className = 'strip';
  strip.draggable = true;
  const key = `${data.intext}-${data.daynight}`;
  strip.style.background = COLORS[key] || '#ccc';
  strip.innerHTML = `
    <button class="del">×</button>
    <div class="top"><span>ESC. ${data.scene}</span><span>${data.intext}/${data.daynight}</span></div>
    <div class="desc">${data.desc || '(sin descripción)'} — ${data.loc || ''}</div>
    <div class="meta">${data.dur ? data.dur+' · ' : ''}${data.cast ? 'Reparto: '+data.cast : ''}</div>
  `;
  strip.addEventListener('dragstart', ()=>{ dragSrc = strip; strip.classList.add('dragging'); });
  strip.addEventListener('dragend', ()=>{ strip.classList.remove('dragging'); updateTotals(); });
  strip.querySelector('.del').addEventListener('click', ()=>{ strip.remove(); updateTotals(); });
  document.querySelector('.column-body[data-day="unassigned"]').appendChild(strip);
  updateTotals();
}

function updateTotals(){
  document.querySelectorAll('.column').forEach(col=>{
    const count = col.querySelectorAll('.strip').length;
    col.querySelector('.total').textContent = `${count} escena${count!==1?'s':''}`;
  });
}

document.getElementById('addSceneBtn').addEventListener('click',()=>{
  const scene = document.getElementById('nScene').value || '?';
  const intext = document.getElementById('nIntExt').value;
  const daynight = document.getElementById('nDayNight').value;
  const loc = document.getElementById('nLoc').value;
  const desc = document.getElementById('nDesc').value;
  const dur = document.getElementById('nDur').value;
  const cast = document.getElementById('nCast').value;
  addScene({scene,intext,daynight,loc,desc,dur,cast});
  ['nScene','nLoc','nDesc','nDur','nCast'].forEach(id=>document.getElementById(id).value='');
});

document.getElementById('printBtn').addEventListener('click',()=>window.print());
</script>
</body>
</html>
