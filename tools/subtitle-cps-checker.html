<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Subtítulos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0E10; --panel:#17191D; --panel-2:#1E2126; --border:#2A2D33;
  --text:#ECEAE5; --text-dim:#8B8F96; --accent:#F2A93B; --good:#5EEAD4; --bad:#E85D5D; --warn:#F2A93B;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);padding:40px 20px;}
.wrap{max-width:1000px;margin:0 auto;}
.sprockets{display:flex;gap:6px;margin-bottom:22px;}
.sprockets span{width:8px;height:8px;border-radius:50%;background:var(--border);}
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:16px;}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 8px;}
h1{margin:0;font-size:26px;font-weight:700;letter-spacing:-0.01em;}
.sub{color:var(--text-dim);font-size:14px;margin-top:8px;max-width:60ch;line-height:1.5;}
.toolbar{display:flex;gap:10px;}
.btn{background:var(--accent);color:#161206;border:none;padding:10px 16px;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.04em;cursor:pointer;text-transform:uppercase;}
.btn.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--border);}
.controls{display:flex;gap:20px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:18px;flex-wrap:wrap;}
.controls .f{display:flex;align-items:center;gap:8px;}
.controls label{font-family:var(--mono);font-size:11px;color:var(--text-dim);}
.controls input[type=number]{width:60px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-family:var(--mono);}
.summary{display:flex;gap:16px;font-family:var(--mono);font-size:11.5px;}
.summary span.n{color:var(--accent);font-weight:700;}
.drop{border:2px dashed var(--border);border-radius:10px;padding:30px;text-align:center;color:var(--text-dim);font-family:var(--mono);font-size:13px;cursor:pointer;margin-bottom:18px;}
.drop:hover{border-color:var(--accent);color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);padding:8px 6px;border-bottom:1px solid var(--border);}
td{padding:8px 6px;border-bottom:1px solid var(--panel-2);vertical-align:top;}
tr.bad{background:rgba(232,93,93,0.08);}
tr.warn{background:rgba(242,169,59,0.06);}
.idx{font-family:var(--mono);color:var(--text-dim);width:36px;}
.tc{font-family:var(--mono);font-size:11px;color:var(--text-dim);width:180px;}
.txt{font-size:13px;}
.txt textarea{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:5px;font-family:var(--sans);font-size:12.5px;resize:vertical;min-height:36px;}
.cps{font-family:var(--mono);font-weight:700;width:70px;text-align:right;}
.cps.ok{color:var(--good);}
.cps.warn{color:var(--warn);}
.cps.bad{color:var(--bad);}
.empty{text-align:center;color:var(--text-dim);padding:40px;font-family:var(--mono);font-size:13px;}
footer{text-align:center;color:var(--text-dim);font-size:12px;margin-top:28px;font-family:var(--mono);}
</style>
</head>
<body>
<div class="wrap">
  <div class="sprockets"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <header>
    <div>
      <p class="eyebrow">Utilidad de producción</p>
      <h1>Verificador de Subtítulos</h1>
      <p class="sub">Carga un .srt y comprueba la velocidad de lectura (CPS) de cada línea contra el límite recomendado.</p>
    </div>
    <div class="toolbar">
      <button class="btn secondary" id="uploadBtn">Cargar .SRT</button>
      <input type="file" id="fileInput" accept=".srt" style="display:none">
      <button class="btn" id="exportBtn">Exportar .SRT</button>
    </div>
  </header>

  <div class="controls">
    <div class="f"><label>Límite CPS recomendado</label><input type="number" id="cpsLimit" value="17" step="1"></div>
    <div class="summary" id="summary"></div>
  </div>

  <div id="content">
    <div class="drop" id="drop">Arrastra un archivo .srt aquí, o pulsa "Cargar .SRT"</div>
  </div>
</div>
<footer>Procesamiento 100% local — el archivo no se envía a ningún servidor</footer>

<script>
let entries = [];

const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', e=>{ if(e.target.files[0]) readFile(e.target.files[0]); });

document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop', e=>{
  e.preventDefault();
  if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
});

function readFile(file){
  const reader = new FileReader();
  reader.onload = ()=>{ entries = parseSrt(reader.result); render(); };
  reader.readAsText(file);
}

function tcToMs(tc){
  const m = tc.match(/(\d+):(\d+):(\d+)[,.](\d+)/);
  if(!m) return 0;
  return (+m[1]*3600+ +m[2]*60+ +m[3])*1000 + +m[4];
}
function msToTc(ms){
  ms = Math.max(0,Math.round(ms));
  const h = Math.floor(ms/3600000); ms%=3600000;
  const m = Math.floor(ms/60000); ms%=60000;
  const s = Math.floor(ms/1000); const msr = ms%1000;
  const p = (n,l=2)=>String(n).padStart(l,'0');
  return `${p(h)}:${p(m)}:${p(s)},${p(msr,3)}`;
}

function parseSrt(text){
  const blocks = text.replace(/\r/g,'').split(/\n\n+/).filter(b=>b.trim());
  return blocks.map((b,i)=>{
    const lines = b.split('\n');
    let idx = i+1, tcLine, textLines;
    if(/^\d+$/.test(lines[0].trim())){
      idx = parseInt(lines[0]); tcLine = lines[1]; textLines = lines.slice(2);
    } else {
      tcLine = lines[0]; textLines = lines.slice(1);
    }
    const m = tcLine.match(/(.+)-->(.+)/);
    const start = m ? tcToMs(m[1].trim()) : 0;
    const end = m ? tcToMs(m[2].trim()) : 1000;
    return {idx, start, end, text: textLines.join('\n')};
  }).filter(e=>e.text!==undefined);
}

function charCount(text){
  return text.replace(/\n/g,' ').replace(/<[^>]*>/g,'').trim().length;
}

function render(){
  const content = document.getElementById('content');
  if(!entries.length){ content.innerHTML = '<div class="drop" id="drop">Arrastra un archivo .srt aquí, o pulsa "Cargar .SRT"</div>'; return; }
  const limit = parseFloat(document.getElementById('cpsLimit').value)||17;

  let bad=0, warn=0;
  const rows = entries.map((e,i)=>{
    const dur = (e.end-e.start)/1000;
    const chars = charCount(e.text);
    const cps = dur>0 ? chars/dur : 0;
    let cls = 'ok';
    if(cps > limit) { cls='bad'; bad++; }
    else if(cps > limit*0.85) { cls='warn'; warn++; }
    return `<tr class="${cls==='bad'?'bad':cls==='warn'?'warn':''}">
      <td class="idx">${e.idx}</td>
      <td class="tc">${msToTc(e.start)}<br>${msToTc(e.end)}<br>(${dur.toFixed(2)}s)</td>
      <td class="txt"><textarea data-i="${i}">${e.text}</textarea></td>
      <td class="cps ${cls}">${cps.toFixed(1)}</td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Tiempo</th><th>Texto</th><th>CPS</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  content.querySelectorAll('textarea').forEach(ta=>{
    ta.addEventListener('input', e=>{
      entries[+e.target.dataset.i].text = e.target.value;
      renderSummaryOnly();
    });
  });

  document.getElementById('summary').innerHTML =
    `<span><span class="n">${entries.length}</span> líneas</span>
     <span style="color:var(--warn)"><span class="n">${warn}</span> cerca del límite</span>
     <span style="color:var(--bad)"><span class="n">${bad}</span> exceden el límite</span>`;
}

function renderSummaryOnly(){
  const limit = parseFloat(document.getElementById('cpsLimit').value)||17;
  let bad=0, warn=0;
  entries.forEach(e=>{
    const dur=(e.end-e.start)/1000, chars=charCount(e.text), cps=dur>0?chars/dur:0;
    if(cps>limit) bad++; else if(cps>limit*0.85) warn++;
  });
  document.getElementById('summary').innerHTML =
    `<span><span class="n">${entries.length}</span> líneas</span>
     <span style="color:var(--warn)"><span class="n">${warn}</span> cerca del límite</span>
     <span style="color:var(--bad)"><span class="n">${bad}</span> exceden el límite</span>`;
}

document.getElementById('cpsLimit').addEventListener('input', render);

document.getElementById('exportBtn').addEventListener('click', ()=>{
  if(!entries.length) return;
  const srt = entries.map((e,i)=>`${i+1}\n${msToTc(e.start)} --> ${msToTc(e.end)}\n${e.text}`).join('\n\n');
  const blob = new Blob([srt], {type:'text/plain;charset=utf-8'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'subtitulos-revisado.srt';
  link.click();
});
</script>
</body>
</html>
