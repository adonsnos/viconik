<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Viconik · Storyboard Rápido</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Bebas+Neue&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --k: #111010; --w: #EDEBE7; --g: #8a8780; --l: #C8C5BF; --b: #E5E3DE;
  --brd: rgba(17,16,16,.1);
  --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  --bebas: 'Bebas Neue', sans-serif; --serif: 'Playfair Display', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--w); color:var(--k); font-family:var(--sans); line-height:1.65; overflow-x:hidden; font-size:18px; }
a { color:inherit; text-decoration:none; }
nav { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:.85rem 3.5rem; background:rgba(237,235,231,.96); backdrop-filter:blur(16px); border-bottom:1px solid var(--brd); }
.nav-logo { display:flex; align-items:center; gap:.6rem; font-family:var(--serif); font-size:1.2rem; letter-spacing:.02em; }
.nav-links { display:flex; gap:2rem; list-style:none; }
.nav-links a { font-size:14px; color:var(--g); transition:color .2s; }
.nav-links a:hover { color:var(--k); }
.nav-cta { font-family:var(--mono); font-size:12px; letter-spacing:.08em; background:var(--k); color:var(--w); padding:.5rem 1.25rem; transition:opacity .2s; }
.nav-cta:hover { opacity:.72; }
.tools-container { max-width:1200px; margin:0 auto; padding:7rem 2rem 4rem; }
.tool-section { margin-bottom:3rem; }
.tool-header { margin-bottom:2rem; border-bottom:1px solid var(--brd); padding-bottom:1rem; }
.tool-header .eyebrow { font-family:var(--mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--g); margin-bottom:.5rem; display:flex; align-items:center; gap:.75rem; }
.tool-header .eyebrow::before { content:''; width:32px; height:1px; background:var(--l); }
.tool-header h2 { font-family:var(--bebas); font-size:clamp(2.2rem,4vw,3.2rem); letter-spacing:.02em; line-height:1.1; color:var(--k); margin-top:.25rem; }
.panel { background:#fff; border:1px solid var(--brd); padding:2rem; transition:box-shadow .2s; }
.panel:hover { box-shadow:0 12px 22px -12px rgba(0,0,0,.08); }
.panel-title { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--g); margin-bottom:1.5rem; padding-bottom:.75rem; border-bottom:1px solid var(--brd); display:flex; align-items:center; gap:.75rem; }
.panel-title i { color:var(--k); font-size:14px; }
.two-col-grid { display:grid; grid-template-columns:1fr 1fr; gap:2rem; align-items:start; }
@media (max-width:1000px){ .two-col-grid{ grid-template-columns:1fr; gap:1.5rem; } }
.param-group { display:flex; flex-direction:column; gap:1.2rem; }
.param-row { display:flex; flex-direction:column; gap:.3rem; }
.param-label { font-family:var(--mono); font-size:10px; text-transform:uppercase; color:var(--g); letter-spacing:.05em; display:flex; align-items:center; gap:6px; }
.inline-row { display:flex; gap:.5rem; align-items:center; }
.inline-row input, .inline-row select { flex:1; }
select, input[type="number"], input[type="text"], input[type="date"], textarea {
  width:100%; padding:.65rem .9rem; background:#fff; border:1px solid var(--brd); border-radius:0;
  font-family:var(--sans); font-size:14px; color:var(--k); transition:border .15s;
}
textarea { resize:vertical; min-height:70px; font-family:var(--sans); }
select:focus, input:focus, textarea:focus { outline:none; border-color:var(--k); }
.preset-chips { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:.3rem; }
.preset-chip { font-family:var(--mono); font-size:10px; padding:.4rem .8rem; border:1px solid var(--brd); background:var(--b); color:var(--k); cursor:pointer; transition:all .15s; text-transform:uppercase; letter-spacing:.05em; }
.preset-chip:hover, .preset-chip.active { background:var(--k); color:var(--w); border-color:var(--k); }
.badge { font-family:var(--mono); font-size:9px; padding:3px 8px; background:var(--w); border:1px solid var(--brd); color:var(--g); text-transform:uppercase; }
.table-wrapper { overflow-x:auto; border:1px solid var(--brd); background:#fff; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { background:var(--k); color:var(--w); }
th { font-family:var(--mono); font-size:10px; letter-spacing:.06em; font-weight:400; text-transform:uppercase; padding:.9rem 1rem; text-align:left; }
td { padding:.7rem 1rem; border-bottom:1px solid var(--brd); color:var(--k); }
td input, td textarea, td select { font-size:12.5px; padding:.4rem .5rem; }
tbody tr:hover td { background:var(--b); }
.btn-group { display:flex; gap:.75rem; flex-wrap:wrap; }
.btn { padding:.7rem 1.1rem; border:1px solid var(--k); background:var(--k); color:var(--w); font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; cursor:pointer; transition:opacity .2s; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
.btn:hover { opacity:.78; }
.btn-secondary { background:transparent; color:var(--k); border:1px solid var(--brd); }
.btn-secondary:hover { background:var(--b); opacity:1; }
.info-box { background:var(--k); color:var(--w); padding:1.25rem; margin-top:1.5rem; display:flex; gap:1rem; align-items:flex-start; font-size:12px; line-height:1.6; }
.info-box i { color:var(--l); font-size:1.2rem; }
.hidden { display:none !important; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem; }
.detail-item { background:#fff; border:1px solid var(--brd); padding:.8rem; text-align:left; }
.detail-item .label-sm { font-family:var(--mono); font-size:9px; color:var(--g); text-transform:uppercase; }
.detail-item .value-md { font-family:var(--mono); font-size:1.2rem; font-weight:500; margin-top:.2rem; }
.row-del { background:none; border:none; color:var(--g); cursor:pointer; font-size:16px; }
.row-del:hover { color:#a83232; }
.add-row-btn { margin-top:.75rem; background:var(--b); border:1px dashed var(--brd); color:var(--g); padding:.7rem; width:100%; cursor:pointer; font-family:var(--mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; }
.add-row-btn:hover { border-color:var(--k); color:var(--k); }
footer { padding:1.5rem 3.5rem; border-top:1px solid var(--brd); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.5rem; font-family:var(--mono); font-size:12px; letter-spacing:.06em; color:var(--g); }
footer a { color:var(--g); transition:color .2s; }
footer a:hover { color:var(--k); }
@media print {
  nav, footer, .btn, .add-row-btn, .row-del, .no-print { display:none !important; }
  body { background:#fff; font-size:12px; }
  .tools-container { padding:1rem; max-width:100%; }
  .panel { box-shadow:none; break-inside:avoid; }
}
@media (max-width:960px) {
  nav { padding:.85rem 1.5rem; }
  .nav-links { display:none; }
  .tools-container { padding:6rem 1.5rem 3rem; }
  .panel { padding:1.5rem; }
  footer { padding:1.25rem 1.5rem; flex-direction:column; text-align:center; }
}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111010">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js').catch(()=>{}));
}
</script>
</head><body>
<nav>
  <a href="index.html" class="nav-logo">Viconik</a>
  <ul class="nav-links">
    <li><a href="index.html">Todas las herramientas</a></li>
    <li><a href="viconik_calculators.html">Calculadoras</a></li>
  </ul>
  <a href="index.html" class="nav-cta">← Índice</a>
</nav>
<main class="tools-container">
<style>
.sb-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:18px; }
.sb-card { background:#fff; border:1px solid var(--brd); padding:14px; cursor:grab; }
.sb-card.dragging { opacity:.4; }
.sb-card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.sb-shot-num { font-family:var(--mono); font-weight:700; font-size:12px; }
.sb-del { color:var(--g); cursor:pointer; font-family:var(--mono); font-size:16px; line-height:1; background:none; border:none; }
.sb-del:hover { color:#a83232; }
.sb-canvas { width:100%; aspect-ratio:16/9; background:#000; border:1px solid var(--brd); touch-action:none; }
.sb-tools { display:flex; gap:6px; margin-top:8px; }
.sb-tools button { flex:1; background:var(--b); border:1px solid var(--brd); color:var(--g); padding:6px; font-family:var(--mono); font-size:11px; cursor:pointer; }
.sb-tools button.active { color:var(--k); border-color:var(--k); }
.sb-fields { margin-top:10px; display:flex; flex-direction:column; gap:8px; }
.sb-fields textarea { min-height:44px; }
.sb-row2 { display:flex; gap:8px; }
.add-card { display:flex; align-items:center; justify-content:center; border:2px dashed var(--brd); min-height:220px; color:var(--g); font-family:var(--mono); font-size:13px; cursor:pointer; }
.add-card:hover { border-color:var(--k); color:var(--k); }
@media print { .sb-tools,.sb-del,.add-card { display:none !important; } }
</style>

<section class="tool-section">
  <div class="tool-header">
    <div class="eyebrow">Herramienta profesional</div>
    <h2>Storyboard Rápido</h2>
    <p style="color:var(--g); max-width:700px; margin-top:.5rem;">Dibuja, describe y ordena planos antes del rodaje. Arrastra las tarjetas para reordenar.</p>
  </div>

  <div class="panel" style="margin-bottom:1.5rem;">
    <div class="two-col-grid" style="gap:1rem;">
      <div class="param-row"><label class="param-label">Proyecto</label><input type="text" id="projectName"></div>
      <div class="param-row"><label class="param-label">Escena / secuencia</label><input type="text" id="sceneName"></div>
    </div>
  </div>

  <div class="btn-group" style="margin-bottom:1.5rem;">
    <button class="btn" id="addBtn">+ Nuevo plano</button>
    <button class="btn btn-secondary" id="printBtn"><i class="fas fa-print"></i> Exportar / imprimir</button>
  </div>

  <div class="sb-grid" id="grid"></div>
</section>

<script>
const grid = document.getElementById('grid');
let shotCount = 0;
function newCard(){
  shotCount++;
  const card = document.createElement('div');
  card.className = 'sb-card'; card.draggable = true;
  card.innerHTML = `
    <div class="sb-card-head"><span class="sb-shot-num">PLANO ${String(shotCount).padStart(2,'0')}</span><button class="sb-del">×</button></div>
    <canvas class="sb-canvas" width="480" height="270"></canvas>
    <div class="sb-tools">
      <button class="pen active" data-tool="pen">Lápiz</button>
      <button class="eraser" data-tool="eraser">Borrar</button>
      <button class="clear-canvas">Limpiar</button>
    </div>
    <div class="sb-fields">
      <textarea placeholder="Descripción del plano..."></textarea>
      <div class="sb-row2">
        <select><option>Fijo</option><option>Pan</option><option>Tilt</option><option>Travelling</option><option>Dolly</option><option>Zoom</option><option>Grúa</option><option>Steadicam / mano</option></select>
        <input type="text" placeholder="Duración (ej. 3s)">
      </div>
    </div>
  `;
  setupCanvas(card.querySelector('canvas'));
  setupDrag(card);
  card.querySelector('.sb-del').addEventListener('click',()=>{card.remove(); renumber();});
  card.querySelectorAll('.sb-tools button[data-tool]').forEach(b=>{
    b.addEventListener('click',()=>{
      card.querySelectorAll('.sb-tools button[data-tool]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); card.dataset.tool = b.dataset.tool;
    });
  });
  card.querySelector('.clear-canvas').addEventListener('click',()=>{
    const c = card.querySelector('canvas'); const ctx = c.getContext('2d');
    ctx.fillStyle='#000'; ctx.fillRect(0,0,c.width,c.height);
  });
  card.dataset.tool = 'pen';
  return card;
}
function setupCanvas(canvas){
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.lineCap='round';
  let drawing = false;
  function pos(e){
    const r = canvas.getBoundingClientRect();
    const cx = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
    const cy = (e.touches?e.touches[0].clientY:e.clientY) - r.top;
    return {x: cx*(canvas.width/r.width), y: cy*(canvas.height/r.height)};
  }
  function start(e){ drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
  function move(e){
    if(!drawing) return;
    const p = pos(e);
    const tool = canvas.closest('.sb-card').dataset.tool;
    ctx.globalCompositeOperation = tool==='eraser' ? 'destination-out' : 'source-over';
    ctx.strokeStyle = tool==='eraser' ? 'rgba(0,0,0,1)' : '#fff';
    ctx.lineWidth = tool==='eraser' ? 16 : 3;
    ctx.lineTo(p.x,p.y); ctx.stroke();
    e.preventDefault();
  }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start);
  canvas.addEventListener('touchmove',move);
  canvas.addEventListener('touchend',end);
}
let dragSrc = null;
function setupDrag(card){
  card.addEventListener('dragstart',()=>{ dragSrc = card; card.classList.add('dragging'); });
  card.addEventListener('dragend',()=>{ card.classList.remove('dragging'); renumber(); });
  card.addEventListener('dragover',e=>{
    e.preventDefault();
    const after = getDragAfter(grid, e.clientY);
    if(after==null) grid.appendChild(dragSrc); else grid.insertBefore(dragSrc, after);
  });
}
function getDragAfter(container,y){
  const els = [...container.querySelectorAll('.sb-card:not(.dragging)')];
  return els.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset<0 && offset > closest.offset) return {offset, element: child};
    return closest;
  }, {offset: -Infinity}).element;
}
function renumber(){
  grid.querySelectorAll('.sb-card').forEach((c,i)=>{
    c.querySelector('.sb-shot-num').textContent = 'PLANO ' + String(i+1).padStart(2,'0');
  });
  shotCount = grid.querySelectorAll('.sb-card').length;
}
document.getElementById('addBtn').addEventListener('click',()=>grid.appendChild(newCard()));
document.getElementById('printBtn').addEventListener('click',()=>window.print());
for(let i=0;i<4;i++) grid.appendChild(newCard());
</script>
</main>
<footer>
  <span>Viconik · Herramientas profesionales de producción audiovisual</span>
  <a href="index.html">Volver al índice de herramientas</a>
</footer>
</body></html>
