<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor HTML</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Bebas+Neue&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<style>
:root{
  --k: #111010; --w: #EDEBE7; --g: #8a8780; --l: #C8C5BF; --b: #E5E3DE;
  --brd: rgba(17,16,16,.1);
  --code-bg:#0D0E10; --code-panel:#17191D; --code-border:#2A2D33; --code-text:#ECEAE5;
  --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif; --bebas:'Bebas Neue',sans-serif; --serif:'Playfair Display',serif;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--w);color:var(--k);font-family:var(--sans);}
a{color:inherit;text-decoration:none;}
.app{display:flex;flex-direction:column;height:100%;}
header{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.5rem;border-bottom:1px solid var(--brd);background:rgba(237,235,231,.96);backdrop-filter:blur(16px);flex-wrap:wrap;gap:10px;}
.title{display:flex;align-items:center;gap:12px;}
.title a.logo{font-family:var(--serif);font-size:1.05rem;letter-spacing:.02em;}
h1{font-size:1.3rem;margin:0;font-family:var(--bebas);letter-spacing:.02em;font-weight:400;}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--g);}
.toolbar{display:flex;gap:8px;align-items:center;}
.btn{background:var(--k);color:var(--w);border:1px solid var(--k);padding:.6rem 1rem;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.04em;cursor:pointer;text-transform:uppercase;}
.btn.secondary{background:transparent;color:var(--k);border:1px solid var(--brd);}
.btn.icon{padding:.6rem .7rem;}
select.layout{background:#fff;border:1px solid var(--brd);color:var(--k);padding:.55rem .6rem;font-family:var(--mono);font-size:11px;}
.main{flex:1;display:flex;overflow:hidden;background:var(--code-bg);}
.main.stacked{flex-direction:column;}
.pane{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
.pane-head{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--g);padding:8px 14px;background:var(--code-panel);border-bottom:1px solid var(--code-border);color:#8B8F96;}
.editor-wrap{flex:1;overflow:hidden;}
.CodeMirror{height:100%;font-family:var(--mono);font-size:13px;}
.divider{width:1px;background:var(--code-border);}
.main.stacked .divider{width:100%;height:1px;}
iframe{flex:1;border:none;background:#fff;width:100%;}
.status{font-family:var(--mono);font-size:10.5px;color:#8B8F96;padding:6px 14px;border-top:1px solid var(--code-border);background:var(--code-panel);}
</style>
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#111010">
<link rel="icon" href="../icons/icon-192.png">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js').catch(()=>{}));
}
</script>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <a href="/tools/index.html" class="logo">Viconik</a>
      <div>
        <div class="eyebrow">Kit de producción</div>
        <h1>Editor HTML</h1>
      </div>
    </div>
    <div class="toolbar">
      <select class="layout" id="layoutSel">
        <option value="side">Vista dividida</option>
        <option value="stacked">Vista apilada</option>
        <option value="code">Solo código</option>
        <option value="preview">Solo vista previa</option>
      </select>
      <button class="btn secondary icon" id="uploadBtn" title="Cargar archivo HTML">Abrir</button>
      <input type="file" id="fileInput" accept=".html,.htm" style="display:none">
      <button class="btn secondary" id="dlBtn">Descargar</button>
      <button class="btn" id="runBtn">▶ Ejecutar</button>
    </div>
  </header>

  <div class="main" id="main">
    <div class="pane" id="codePane">
      <div class="pane-head">Código</div>
      <div class="editor-wrap"><textarea id="code"></textarea></div>
    </div>
    <div class="divider"></div>
    <div class="pane" id="previewPane">
      <div class="pane-head">Vista previa en vivo</div>
      <iframe id="preview"></iframe>
    </div>
  </div>
  <div class="status" id="status">Listo</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script>
const STARTER = `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Documento</title>
<style>
  body{font-family:sans-serif;padding:40px;background:#111;color:#eee;}
  h1{color:#F2A93B;}
</style>
</head>
<body>
<h1>Hola</h1>
<p>Edita este código y pulsa Ejecutar para ver los cambios.</p>
</body>
</html>`;

const cm = CodeMirror.fromTextArea(document.getElementById('code'), {
  mode: 'htmlmixed',
  theme: 'dracula',
  lineNumbers: true,
  lineWrapping: true,
  tabSize: 2,
  autoCloseTags: true,
  extraKeys: {
    "Ctrl-Enter": runPreview,
    "Cmd-Enter": runPreview
  }
});
cm.setValue(STARTER);

function runPreview(){
  const code = cm.getValue();
  const iframe = document.getElementById('preview');
  iframe.srcdoc = code;
  document.getElementById('status').textContent = 'Ejecutado a las ' + new Date().toLocaleTimeString('es-ES');
}

let debounce;
cm.on('change', ()=>{
  clearTimeout(debounce);
  debounce = setTimeout(runPreview, 500);
});

document.getElementById('runBtn').addEventListener('click', runPreview);

document.getElementById('dlBtn').addEventListener('click', ()=>{
  const blob = new Blob([cm.getValue()], {type:'text/html'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'documento.html';
  link.click();
});

document.getElementById('uploadBtn').addEventListener('click', ()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{ cm.setValue(reader.result); runPreview(); };
  reader.readAsText(file);
});

document.getElementById('layoutSel').addEventListener('change', e=>{
  const main = document.getElementById('main');
  const codePane = document.getElementById('codePane');
  const previewPane = document.getElementById('previewPane');
  main.classList.remove('stacked');
  codePane.style.display = 'flex';
  previewPane.style.display = 'flex';
  if(e.target.value==='stacked') main.classList.add('stacked');
  if(e.target.value==='code') previewPane.style.display = 'none';
  if(e.target.value==='preview') codePane.style.display = 'none';
  cm.refresh();
});

runPreview();
</script>
</body>
</html>
