<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Viconik</title>
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --k: #0a0a0a; --w: #f4f1ea; --mono: 'DM Mono', monospace; --serif: 'Playfair Display', serif; }
* , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--k); color: var(--w); font-family: var(--serif);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem; text-align: center; -webkit-font-smoothing: antialiased;
}
.wrap { display: flex; flex-direction: column; align-items: center; gap: 1.75rem; }
h1 { font-size: 1.6rem; font-weight: 600; }
p { font-family: var(--mono); font-size: 12px; color: rgba(244,241,234,.5); letter-spacing: .04em; }
a {
  font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--w); border: 1.5px solid rgba(244,241,234,.3); padding: .75rem 1.75rem;
  text-decoration: none; transition: border-color .2s;
}
a:hover { border-color: var(--w); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Página no encontrada</h1>
  <p>La página que buscas no existe o se ha movido.</p>
  <a href="/">Volver al inicio</a>
</div>
</body>
</html>
